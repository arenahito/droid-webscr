name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # actions/checkout v6

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # actions/setup-java v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # gradle/actions/setup-gradle v5
        with:
          gradle-version: "9.5.1"

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # pnpm/action-setup v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # actions/setup-node v6
        with:
          node-version: "24"
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm type-check
      - run: pnpm test
      - run: pnpm android:check
      - run: pnpm android:build
      - run: pnpm package:dry-run
